<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <div class="container">
<div class="form-container">

    <!-- Logo -->
    <img src="logo.png" 
         alt="Bus Logo" 
         width="100" 
         class="me-3">

<h2 class="text-center mb-4">Bus Transport Booking Form</h2>

<form>

<!-- Name -->
<div class="row mb-3">
    <label class="form-label">Name of Booking Officer</label>
    <div class="col-md-6">
        <input type="text" class="form-control" placeholder="First Name">
    </div>
    <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Last Name">
    </div>
</div>

<!-- Number of People & Seats -->
<div class="row mb-3">
    <div class="col-md-6">
        <label class="form-label">Number of People Going</label>
        <select class="form-select">
            <option selected disabled>Select Number</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>10</option>
        </select>
    </div>

    <div class="col-md-6">
        <label class="form-label">Number of Seats</label>
        <input type="number" class="form-control" placeholder="Enter Seats">
    </div>
</div>

<!-- Date & Time -->
<div class="mb-3">
    <label class="form-label">Date of Pick-Up</label>
    <input type="date" class="form-control">
</div>

<div class="mb-3">
    <label class="form-label">Time of Pick-Up</label>
    <input type="time" class="form-control">
</div>

<!-- Pick Up Point -->
<h5 class="mt-4">Pick Up Point</h5>

<div class="mb-3">
    <input type="text" class="form-control" placeholder="Street Address">
</div>

<div class="mb-3">
    <input type="text" class="form-control" placeholder="Street Address Line 2">
</div>

<div class="row mb-3">
    <div class="col-md-6">
        <input type="text" class="form-control" placeholder="City">
    </div>
    <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Region">
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Postal / Zip Code">
    </div>
    <div class="col-md-6">
        <select class="form-select">
            <option selected>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Australia</option>
        </select>
    </div>
</div>

<!-- Destination -->
<h5 class="mt-4">Destination</h5>

<div class="mb-3">
    <input type="text" class="form-control" placeholder="Street Address">
</div>

<div class="mb-3">
    <input type="text" class="form-control" placeholder="Street Address Line 2">
</div>

<!-- Submit Button -->
<div class="text-center mt-4">
    <button type="submit" class="btn btn-warning px-5">Submit</button>
</div>

</form>

</div>
</div>
</body>
</html>
