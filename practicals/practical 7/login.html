<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Unique Login Form</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    background: linear-gradient(to right, slateblue, lightseagreen);
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 15px;
    width: 350px;
    color: white;
}

.login-card input {
    border-radius: 30px;
    padding: 10px 20px;
}

.login-btn {
    border-radius: 30px;
    background-color: white;
    color: slateblue;
    font-weight: bold;
}

.login-btn:hover {
    background-color: lightgray;
}
</style>

</head>
<body>

<div class="login-card text-center">

    <!-- Logo -->
    <img src="https://cdn-icons-png.flaticon.com/512/5087/5087579.png" width="70" class="mb-3">

    <h3 class="mb-4">Welcome Back</h3>

    <form>
        <div class="mb-3">
            <input type="email" class="form-control" placeholder="Email Address" required>
        </div>

        <div class="mb-3">
            <input type="password" class="form-control" placeholder="Password" id="password" required>
        </div>

        <div class="form-check text-start mb-3">
            <input class="form-check-input" type="checkbox" onclick="togglePassword()">
            <label class="form-check-label">
                Show Password
            </label>
        </div>

        <button type="submit" class="btn login-btn w-100">Login</button>

        <div class="mt-3">
            <small>Don't have an account? <a href="#" class="text-white">Register</a></small>
        </div>
    </form>

</div>

<script>
function togglePassword() {
    var x = document.getElementById("password");
    if (x.type === "password") {
        x.type = "text";
    } else {
        x.type = "password";
    }
}
</script>

</body>
</html>
