<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tailwind Navbar</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-blue-600 text-white p-4">
    <div class="container mx-auto flex justify-between items-center">

        <!-- Logo -->
        <h1 class="text-xl font-bold">MyWebsite</h1>

        <!-- Menu -->
        <ul class="flex space-x-6 items-center">

            <li><a href="#" class="hover:text-gray-200">Home</a></li>
            <li><a href="#" class="hover:text-gray-200">About</a></li>

            <!-- Dropdown -->
            <li class="relative group">
                <button class="hover:text-gray-200">Services ▼</button>

                <!-- Dropdown Menu -->
                <ul class="absolute hidden group-hover:block bg-white text-black mt-2 rounded shadow-lg w-40">
                    <li class="px-4 py-2 hover:bg-gray-200 cursor-pointer">Web Design</li>
                    <li class="px-4 py-2 hover:bg-gray-200 cursor-pointer">Development</li>
                    <li class="px-4 py-2 hover:bg-gray-200 cursor-pointer">SEO</li>
                </ul>
            </li>

            <li><a href="#" class="hover:text-gray-200">Contact</a></li>

        </ul>
    </div>
</nav>

</body>
</html>
