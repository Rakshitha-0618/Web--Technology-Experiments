<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg p-4">
                <h3 class="text-center mb-4">Student Registration</h3>

                <form id="form">

                    <div class="mb-3">
                        <label class="form-label">Enrollment Number</label>
                        <input type="text" class="form-control" id="enroll">
                        <small class="text-danger" id="enrollError"></small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name">
                        <small class="text-danger" id="nameError"></small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="text" class="form-control" id="email">
                        <small class="text-danger" id="emailError"></small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="password">
                        <small class="text-danger" id="passError"></small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword">
                        <small class="text-danger" id="confirmError"></small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" id="phone">
                        <small class="text-danger" id="phoneError"></small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" id="address"></textarea>
                        <small class="text-danger" id="addressError"></small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Gender</label><br>
                        <input type="radio" name="gender" value="Male"> Male
                        <input type="radio" name="gender" value="Female"> Female
                        <br>
                        <small class="text-danger" id="genderError"></small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Branch</label>
                        <select class="form-select" id="branch">
                            <option value="">Select Branch</option>
                            <option>CSE</option>
                            <option>IT</option>
                            <option>ECE</option>
                            <option>ME</option>
                        </select>
                        <small class="text-danger" id="branchError"></small>
                    </div>

                    <button class="btn btn-primary w-100">Register</button>

                </form>

            </div>

        </div>
    </div>
</div>

<footer class="footer text-center py-3 text-white" style="background-color: skyblue;">
    <p class="m-0"> Karthik -- 9</p>
</footer>
<script src="script.js"></script>

</body>
</html>
