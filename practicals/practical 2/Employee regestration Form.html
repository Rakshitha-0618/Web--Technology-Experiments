<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
     <div class="card">
     <form>

     <h1 align="center">Employee Regestration Form</h1>  
<br>
     <p>Fill in this form to register</p>
<br>
     <label><b>First Name</b></label>
     <input type ="text" value="">  
<br />
<br />
     <label><b>Last Name</b></label>
     <input type ="text" value="">  
<br />
<br />
     <label><b>E-mail</b></label>
     <input type ="text" value="">  
<br />
<br />
    <label><b>Phone no.</b></label>
     <input type ="text" value="">  
<br />
<br />
     <label><b>Marital Status</b></label>
       <select name="status">
        <option disabled selected>--status--</option>
        <option>Married</option>
        <option>Not Married</option>
       </select>
<br>
<br>
    <label for="dob"><b>Date of Birth</b></label>
    <input type="date" id="dob" name="dob"> 
<br />
<br />
     <label><b>Gender</b></label><br>
     <input type="radio" name="gender" value="Male" />Male<br>
     <input type="radio" name="gender" value="Female" />Female<br>
     <input type="radio" name="gender" value="Others" />Others
<br />
<br />
     <label><b>Year of Pursuing</b></label>

      <select name="year">
        <option disabled selected>-- Select Year --</option>
        <option value="2020">2020</option>
        <option value="2021">2021</option>
        <option value="2022">2022</option>
        <option value="2023">2023</option>
        <option value="2024">2024</option>
        <option value="2025">2025</option>
</select>
<br>
<br>
      <label><b>job role</b></label>
     <dropdownlist>
        <select name="role">
            <option  disabled selected>---role---</option>
            <option>Soc Analyst</option>
            <option>Malware Analyst</option>
            <option>Pentester</option>
            <option>Developer</option>
        </select>
     </dropdownlist>
<br>
<br>
      <label><b>Employement type</b></label><br>
       <input type="radio" name="type" value="Full-Time">Full-Time<br>
       <input type="radio" name="type" value="Part-Time">Part-Time<br>
       <input type="radio" name="type" value="Contract">Contract<br>
<input type="submit" value="Regiester" name="Regiester"  />
</form>
</div>
 </body>
</html>
